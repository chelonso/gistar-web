    <script>

        document.addEventListener('DOMContentLoaded', function() {
            const mobileToggle = document.querySelector('.nav-mobile-toggle');
            const navContainer = document.querySelector('.nav-container');

            if (mobileToggle && navContainer) {
                mobileToggle.addEventListener('click', function() {
                    navContainer.classList.toggle('menu-open');
                });
            }

            // Lógica para cargar y mostrar los datos del challenge
            const challengeResultsDiv = document.getElementById('challenge-results');

            async function loadChallengeData() {
                try {
                    const indexResponse = await fetch('/data/challenge/index.json');
                    const indexData = await indexResponse.json();
                    console.log('Index Data:', indexData);

                    for (const level of indexData) {
                        console.log('Loading level file:', level.level_file);
                        const levelResponse = await fetch(level.level_file);
                        const levelData = await levelResponse.json();
                        console.log('Level Data for', level.level_title, ':', levelData);

                        // Ordenar por puntaje final de forma descendente
                        levelData.sort((a, b) => b.points - a.points);

                        let htmlContent = `<h5>${level.level_title}</h5>`;
                        htmlContent += `<div class="apparatus-buttons">`;
                        // Botones para filtrar por aparatos
                        const apparatuses = ['vault', 'uneven_bars', 'balance_beam', 'floor']; // Nombres de aparatos del JSON
                        const displayNames = ['Salto', 'Asimétricas', 'Viga', 'Suelo']; // Nombres a mostrar
                        apparatuses.forEach((app, i) => {
                            htmlContent += `<button class="btn btn--sm btn--primary type--uppercase filter-button" data-apparatus="${app}">${displayNames[i]}</button>`;
                        });
                        htmlContent += `<button class="btn btn--sm btn--primary type--uppercase filter-button" data-apparatus="all">Total</button>`;
                        htmlContent += `</div>`;
                        htmlContent += `<table class="challenge-table" data-level="${level.level_title}">`;
                        htmlContent += `<thead><tr><th>Puesto</th><th>Nombre</th><th>Salto</th><th>Asimétricas</th><th>Viga</th><th>Suelo</th><th>Puntaje</th></tr></thead>`;
                        htmlContent += `<tbody>`;

                        let currentRank = 1;
                        let previousScore = -1;

                        levelData.forEach((competitor, index) => {
                            if (competitor.points !== previousScore) {
                                currentRank = index + 1;
                            }
                            previousScore = competitor.points;

                            htmlContent += `<tr data-name="${competitor.name.toLowerCase()}">`;
                            htmlContent += `<td>${currentRank}</td>`;
                            htmlContent += `<td>${competitor.name}</td>`;
                            htmlContent += `<td data-apparatus="vault">${competitor.vault.toFixed(2)}</td>`;
                            htmlContent += `<td data-apparatus="uneven_bars">${competitor.uneven_bars.toFixed(2)}</td>`;
                            htmlContent += `<td data-apparatus="balance_beam">${competitor.balance_beam.toFixed(2)}</td>`;
                            htmlContent += `<td data-apparatus="floor">${competitor.floor.toFixed(2)}</td>`;
                            htmlContent += `<td data-apparatus="points">${competitor.points.toFixed(2)}</td>`;
                            htmlContent += `</tr>`;
                        });

                        htmlContent += `</tbody></table></p>`;
                        console.log('Generated HTML Content:', htmlContent);
                        challengeResultsDiv.innerHTML += htmlContent;
                    }

                    // Añadir event listeners a los botones de filtro
                    document.querySelectorAll('.filter-button').forEach(button => {
                        button.addEventListener('click', function() {
                            const apparatus = this.dataset.apparatus;
                            const table = this.closest('.row').querySelector('.challenge-table');
                            const headers = table.querySelectorAll('th');
                            const rows = table.querySelectorAll('tbody tr');

                            headers.forEach(header => header.style.display = 'table-cell'); // Mostrar todos los encabezados por defecto
                            rows.forEach(row => row.querySelectorAll('td').forEach(cell => cell.style.display = 'table-cell')); // Mostrar todas las celdas por defecto

                            if (apparatus !== 'all') {
                                headers.forEach(header => {
                                    if (!['Puesto', 'Nombre', apparatus].includes(header.textContent)) {
                                        header.style.display = 'none';
                                    }
                                });
                                rows.forEach(row => {
                                    row.querySelectorAll('td').forEach(cell => {
                                        if (!['', apparatus].includes(cell.dataset.apparatus) && cell.cellIndex > 1) { // No ocultar Puesto y Nombre
                                            cell.style.display = 'none';
                                        }
                                    });
                                });
                            }
                        });
                    });


                } catch (error) {
                    console.error('Error al cargar los datos del challenge:', error);
                    challengeResultsDiv.innerHTML = '<p>Error al cargar los datos del challenge.</p>';
                }
            }

            loadChallengeData();
        });

    </script>
