server {

  listen 443 ssl http2;
  listen [::]:443 ssl http2;


  server_name www.gistar.com.py gistar.com.py;

  error_log  /var/log/nginx/error.log;
  access_log /var/log/nginx/access.log;

  root /var/www/html/web;

  index index.html;

  ssl_certificate /etc/letsencrypt/live/gistar.com.py/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/gistar.com.py/privkey.pem;

  location = /favicon.ico { log_not_found off; access_log off; }
  location = /robots.txt { log_not_found off; access_log off; allow all; }
  location ~* \.(css|gif|ico|jpeg|jpg|js|png)$ {
      expires max;
      log_not_found off;
  }

  location /.well-known/acme-challenge/ {
      allow all;
      root /var/www/certbot;
  }

  # Nueva regla para la descarga del reglamento
  location = /reglamento {
      alias /var/www/html/web/files/reglamento.pdf;
      default_type application/pdf;
      add_header Content-Disposition 'attachment; filename="reglamento.pdf"';
  }


  location / {
    try_files $uri $uri/ $uri.html /index.html;
  }

  location /css {
    alias /var/www/html/web/css;
  }

  location /js {
    alias /var/www/html/web/js;
  }

  location /img {
    alias /var/www/html/web/img;
  }

  location ~ /\.ht {
    deny all;
  }

}

server {

    listen 80;
    listen [::]:80;

    server_name www.gistar.com.py gistar.com.py;
    server_tokens off;

    location /.well-known/acme-challenge/ {
        allow all;
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }

}
